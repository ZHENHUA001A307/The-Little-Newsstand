name: EPUB to RSS Pusher

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install ebooklib beautifulsoup4 lxml

      - name: Run Script
        run: |
          python <<EOF
          import os
          import datetime
          import ebooklib
          import zipfile
          from ebooklib import epub
          from bs4 import BeautifulSoup

          # 1. 读取进度数字
          try:
              with open('progress.txt', 'r') as f:
                  content = f.read().strip()
                  current_index = int(content)
          except Exception as e:
              print(f"DEBUG: 读取 progress.txt 失败，默认从 1 开始: {e}")
              current_index = 1

          # 2. 扫描文件夹
          search_str = f"{current_index:0>3}"
          target_file = None
          if not os.path.exists('books'):
              print("DEBUG: 错误！找不到名为 'books' 的文件夹。")
              exit(1)
          else:
              all_files = os.listdir('books')
              for f in all_files:
                  if search_str in f and f.lower().endswith('.epub'):
                      target_file = os.path.join('books', f)
                      break

          if not target_file:
              print(f"DEBUG: 匹配失败。没找到包含 '{search_str}' 的 epub 文件。")
              exit(1)

          print(f"DEBUG: 尝试解析文件: {target_file}")

          # 3. 增强版解析 EPUB (处理损坏的 Manifest)
          content_html = ""
          try:
              # 尝试正常读取
              book = epub.read_epub(target_file)
              for item in book.get_items_of_type(ebooklib.ITEM_DOCUMENT):
                  soup = BeautifulSoup(item.get_content(), 'html.parser')
                  for img in soup.find_all('img'):
                      img.decompose()
                  body = soup.find('body')
                  if body:
                      content_html += "".join([str(c) for c in body.contents])
          except Exception as e:
              print(f"DEBUG: ebooklib 无法正常解析 ({e})，切换至强制提取模式...")
              # 兜底方案：直接从 Zip 压缩包里捞所有的 html/xhtml 文件
              with zipfile.ZipFile(target_file, 'r') as z:
                  # 找到所有可能是内容的文件，按字母顺序排序
                  content_files = [f for f in z.namelist() if f.lower().endswith(('.html', '.xhtml', '.htm'))]
                  content_files.sort() 
                  
                  for f_name in content_files:
                      with z.open(f_name) as f:
                          soup = BeautifulSoup(f.read(), 'html.parser')
                          for img in soup.find_all('img'):
                              img.decompose()
                          body = soup.find('body')
                          if body:
                              content_html += "".join([str(c) for c in body.contents])

          if not content_html:
              print("DEBUG: 错误，未能从文件中提取到任何内容。")
              exit(1)

          # 4. 生成 RSS
          pub_date = datetime.datetime.now().strftime('%a, %d %b %Y %H:%M:%S +0000')
          rss_feed = f"""<?xml version="1.0" encoding="UTF-8" ?>
          <rss version="2.0">
          <channel>
              <title>我的每日小说</title>
              <link>https://github.com/${{ github.repository }}</link>
              <item>
                  <title>{os.path.basename(target_file)}</title>
                  <description><![CDATA[{content_html}]]></description>
                  <pubDate>{pub_date}</pubDate>
                  <guid>{current_index}</guid>
              </item>
          </channel>
          </rss>"""

          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(rss_feed)

          # 5. 更新进度
          with open('progress.txt', 'w') as f:
              f.write(str(current_index + 1))
          print(f"DEBUG: 任务完成，进度已更新为 {current_index + 1}。")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml progress.txt
          git commit -m "Update RSS: Sent chapter $(cat progress.txt)" || echo "Nothing to commit"
          git push
